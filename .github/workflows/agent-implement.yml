name: Agent Implement

# Thin caller: label an issue `agent:implement` Ôćĺ run the reusable `implement`
# workflow Ôćĺ the agent builds the issue on an `agent/ÔÇŽ` branch, the workflow
# pushes it, and the sandcastle `implement-finalize` hook opens the draft PR.
# `enable-ruby: false` ÔÇö YAML/TypeScript repo (ADR-0002).
on:
  workflow_dispatch:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'agent:implement'
    uses: michaelloistl/agent-workflows/.github/workflows/implement.yml@main
    with:
      enable-ruby: false
      git-author-email: michael.loistl@gmail.com
    secrets: inherit
