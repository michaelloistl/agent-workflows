name: Agent Review PR

# Thin caller: label an open PR `agent:review-pr` → run the reusable `review-pr`
# workflow read-only → the `review-pr-finalize` hook posts the review.
on:
  workflow_dispatch:
  pull_request_target:
    types: [labeled]

permissions:
  # write (not read): the reusable review-pr job needs contents:write to merge a
  # clean slice into its PRD branch (the slice review loop, #7). A reusable
  # workflow can't exceed its caller's token grant, so the caller must grant it
  # too. The review agent run itself stays read-only.
  contents: write
  issues: write
  pull-requests: write

jobs:
  review-pr:
    # pull_request_target runs PR-head code with secrets; on this public repo,
    # gate to internal authors so an external PR can never trigger the run.
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event.label.name == 'agent:review-pr')
      && (github.event_name == 'workflow_dispatch'
          || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association))
    uses: michaelloistl/agent-workflows/.github/workflows/review-pr.yml@main
    with:
      enable-ruby: false
      git-author-email: michael.loistl@gmail.com
    secrets: inherit
