name: Agent Implement PRD (kickoff)

# Thin caller: label a PRD issue `agent:implement-prd` → run the reusable
# `implement-prd` orchestrator in kickoff mode → it cuts the PRD branch and
# dispatches the first tracer-bullet. The advance side is a separate caller
# (on PR-merge).
on:
  workflow_dispatch:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  kickoff:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'agent:implement-prd'
    uses: michaelloistl/agent-workflows/.github/workflows/implement-prd.yml@main
    with:
      mode: kickoff
      git-author-email: michael.loistl@gmail.com
    secrets: inherit
