name: Agent Implement PR

# Thin caller: label an open PR `agent:implement` → run the reusable
# `implement-pr` workflow → the agent addresses review feedback and commits, the
# workflow pushes, and the `implement-pr-finalize` hook posts threaded replies.
# Distinguished from the issue-triggered `agent:implement` by the trigger event.
on:
  workflow_dispatch:
  pull_request_target:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement-pr:
    # pull_request_target runs PR-head code with secrets; on this public repo,
    # gate to internal authors so an external PR can never trigger the run.
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event.label.name == 'agent:implement')
      && (github.event_name == 'workflow_dispatch'
          || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association))
    uses: michaelloistl/agent-workflows/.github/workflows/implement-pr.yml@main
    with:
      enable-ruby: false
      git-author-email: michael.loistl@gmail.com
    secrets: inherit
